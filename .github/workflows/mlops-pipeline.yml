name: Model Validation and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull training data from DVC
        run: dvc pull

      - name: Train model and capture run ID
        id: train
        run: |
          OUTPUT="$(python train.py)"
          echo "$OUTPUT"

          RUN_ID="$(echo "$OUTPUT" | grep '^MLFLOW_RUN_ID=' | tail -n1 | cut -d'=' -f2)"
          if [ -z "$RUN_ID" ]; then
            echo "Could not extract MLflow run ID from train.py output." >&2
            exit 1
          fi

          echo "$RUN_ID" > model_info.txt
          echo "Saved run ID to model_info.txt"

      - name: Upload model info artifact
        uses: actions/upload-artifact@v6
        with:
          name: model-info
          path: model_info.txt

  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Download model info artifact
        uses: actions/download-artifact@v5
        with:
          name: model-info

      - name: Check model accuracy threshold
        run: python check_threshold.py --model-info model_info.txt --threshold 0.85

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
